# Exported from a working machine with `conda env export --from-history`.
# Lists only EXPLICITLY-installed packages (no platform-specific build hashes),
# so the file is portable across machines.
#
# NOT included in this yml -- handled by fireants_install.py:
#   * pip packages (torch, fireants) -- pip pkgs aren't captured by --from-history
#   * fireants_fused_ops -- a compiled .so that must be built on the target
#     machine for that GPU's compute capability (the .so built on the source
#     machine only runs on its own GPU arch, e.g. sm_61 for a GTX 1080).
name: pre_env
channels:
  - nvidia/label/cuda-12.1.1   # provides cuda-toolkit 12.1 (gives us nvcc)
  - conda-forge                # provides gcc=12 / gxx=12 (CUDA 12.1 needs gcc <=13)
  - defaults
